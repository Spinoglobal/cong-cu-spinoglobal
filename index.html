<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Công Cụ Tính Cước Vận Chuyển Hàng Ký Gửi Spinoglobal</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: #ffffff;
      color: #06112e;
      padding: 20px;
      max-width: none;
      margin: auto;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo img {
      width: 220px;
    }

    h2 {
      text-align: center;
      color: #06112e;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 12px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    button {
      margin-top: 20px;
      width: 100%;
      background-color: #06112e;
      color: #fff;
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .result, .price-info {
      margin-top: 20px;
      padding: 16px;
      background: #eaf0ff;
      border-left: 4px solid #06112e;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="logo">
  <img src="https://spinoglobal.vn/Upload/Upload/7be172a4-60ef-40fa-9a1a-39033fd53b60-Logo-06.png" alt="Spinoglobal.vn Logo">
</div>

<h2>Công Cụ Tính Cước Vận Chuyển Hàng Ký Gửi Spinoglobal</h2>
<p style="text-align:center; font-style:italic">Kho đích: Hà Nội</p>

<div class="price-info">
  Tuyến TMĐT: <strong>24.000đ/kg</strong>. Tính theo cân nặng thực tế.
</div>

<label for="weight">Cân nặng thực tế (kg):</label>
<input type="number" id="weight" placeholder="Ví dụ: 10" step="0.1" />

<button onclick="tinhCuoc()">Tính cước</button>

<div class="result" id="output"></div>

<script>
  function tinhCuoc() {
    const weight = parseFloat(document.getElementById("weight").value);
    const output = document.getElementById("output");

    if (isNaN(weight) || weight <= 0) {
      output.innerHTML = "⚠️ Vui lòng nhập cân nặng.";
      return;
    }

    const cuoc = weight * 24000;
    output.innerHTML = `Tuyến TMĐT: tính theo cân nặng thực tế.<br><strong>${weight}kg × 24.000đ = ${cuoc.toLocaleString()}đ</strong>`;
  }
</script>

</body>
</html>
